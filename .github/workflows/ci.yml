name: Calculadora Automatizada CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3
    
    - name: Configurar Python 3.10
      uses: actions/setup-python@v4
      with:
        python-version: "3.10"
        
    - name: Instalar dependencias
      run: |
        python -m pip install --upgrade pip
        pip install flake8 xlwings
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
        
    - name: Análisis estático de código con flake8 (QA Check)
      run: |
        # Detiene el pipeline si hay errores críticos de sintaxis en Python
        flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
        # Muestra advertencias de formato sin detener el pipeline (exit-zero)
        flake8 . --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics